name: CI

on:
  pull_request:
  merge_group:

env:
  GH_TOKEN: ${{ github.token }}
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

defaults:
  run:
    shell: bash

jobs:
  run-hermit:
    name: Run
    runs-on: "ubuntu-24.04-arm"
    defaults:
      run:
        working-directory: kernel
    strategy:
      matrix:
        a: [0, 1]
        b: [0, 1]
        c: [0, 1]
        d: [0, 1]
        arch: [aarch64]
        profile: [release]
        include:
          - arch: aarch64
            packages: qemu-system-arm ipxe-qemu
            rs_flags: --features hermit/semihosting
            qemu_flags:

    steps:
      - name: Checkout hermit-rs
        uses: actions/checkout@v6
        with:
          repository: hermit-os/hermit-rs
      - name: Checkout hermit-kernel
        uses: actions/checkout@v6
        with:
          path: kernel
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends ${{ matrix.packages }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: mkroening/rust-toolchain-toml@main
      - uses: mkroening/rust-toolchain-toml@main
        with:
          toolchain-file: "kernel/rust-toolchain.toml"
      - name: Download loader
        run: gh release download --repo hermit-os/loader --pattern 'hermit-loader-${{ matrix.arch }}*'
      - run: cargo xtask ci rs --arch ${{ matrix.arch }} --profile ${{ matrix.profile }} ${{ matrix.rs_flags }} --package stdin qemu
      - run: cargo xtask ci rs --arch ${{ matrix.arch }} --profile ${{ matrix.profile }} ${{ matrix.rs_flags }} --package stdin qemu
      - run: cargo xtask ci rs --arch ${{ matrix.arch }} --profile ${{ matrix.profile }} ${{ matrix.rs_flags }} --package stdin qemu
      - run: cargo xtask ci rs --arch ${{ matrix.arch }} --profile ${{ matrix.profile }} ${{ matrix.rs_flags }} --package stdin qemu
